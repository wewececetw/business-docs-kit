name: Slack Notifications

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on new Issue
        if: github.event_name == 'issues'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":memo: *新 Issue*: <${{ github.event.issue.html_url }}|${{ github.event.issue.title }}>\n*開單者*: ${{ github.event.issue.user.login }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on new PR
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":rocket: *新 PR*: <${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>\n*作者*: ${{ github.event.pull_request.user.login }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on PR merged
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *PR Merged*: <${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>\n*合併者*: ${{ github.event.pull_request.merged_by.login }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
